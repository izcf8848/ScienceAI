name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream main

      - name: Check if upstream has new commits
        id: check
        run: |
          CURRENT=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "No new commits from upstream. Skipping."
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
            echo "Upstream has new commits. Will create PR."
          fi

      - name: Create PR from upstream/main
        if: steps.check.outputs.has_diff == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'sync: merge upstream/main'
          title: '[Upstream Sync] New commits from cmliu/edgetunnel'
          body: |
            ## Upstream Sync
            Upstream `cmliu/edgetunnel` (main branch) has new commits.
            ### ⚠️ 请务必在 Merge 前检查：
            1. 确认 `_worker.js` 改动不会破坏节点
            2. 如有新增环境变量，需在 CF Pages 中手动添加
            3. 在临时 Pages 域名上测试后再 Merge
          branch: sync/upstream-main
          base: main
          delete-branch: true
